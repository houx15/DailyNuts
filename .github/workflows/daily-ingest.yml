name: Daily Ingest

on:
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:
  push:
    tags:
      - 'run-*'

permissions:
  contents: write

jobs:
  ingest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Pull latest main
        run: git pull --rebase origin main

      - name: Install dependencies
        run: |
          pip install -r ingest/requirements.txt
          python -m playwright install --with-deps chromium

      - name: Run ingest pipeline
        env:
          LLM_BASE_URL: ${{ secrets.LLM_BASE_URL }}
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          LLM_MODEL: ${{ secrets.LLM_MODEL }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python ingest/main.py

      - name: Commit new content
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add content/
          git diff --cached --quiet || git commit -m "Daily ingest: $(date -u +%Y-%m-%d)"
          git push origin HEAD:main

      - name: Clean up trigger tag
        if: startsWith(github.ref, 'refs/tags/run-')
        run: git push origin --delete "${{ github.ref_name }}"

  deploy:
    needs: ingest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build Next.js
        working-directory: web
        env:
          NEXT_PUBLIC_BASE_PATH: ''
        run: |
          npm ci
          npm run build

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: web/dist
          commit_message: "Deploy: ${{ github.event.head_commit.message || 'Daily build' }}"
