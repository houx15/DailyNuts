llm:
  base_url: "https://api.openai.com/v1"
  model: "gpt-4o-mini"
  api_key: "${LLM_API_KEY}"
  max_tokens: 500
  temperature: 0.3

languages:
  - en
  - zh

schedule:
  cron: "0 8 * * *"

sources:
  - id: openai_news
    name: "OpenAI News"
    name_zh: "OpenAI 新闻"
    type: rss
    url: "https://openai.com/news/rss.xml"
    category: company_blog

  - id: google_research
    name: "Google Research Blog"
    name_zh: "Google Research 博客"
    type: rss
    url: "https://research.google/blog/rss"
    category: company_blog

  - id: arxiv_cs_cl
    name: "arXiv cs.CL"
    name_zh: "arXiv 计算语言学"
    type: arxiv
    categories: ["cs.CL", "cs.AI", "cs.LG"]
    keywords: ["large language model", "LLM", "agent", "reasoning",
               "alignment", "RLHF", "instruction tuning", "RAG",
               "multi-agent", "tool use", "code generation",
               "chain of thought", "transformer"]
    max_results_per_day: 30
    category: paper

  - id: hf_papers
    name: "Hugging Face Daily Papers"
    name_zh: "Hugging Face 每日论文"
    type: rss
    url: "https://papers.takara.ai/api/feed"
    category: paper

  - id: anthropic_research
    name: "Anthropic Research"
    name_zh: "Anthropic 研究"
    type: rss
    url: "https://raw.githubusercontent.com/Olshansk/rss-feeds/main/feeds/feed_anthropic_research.xml"
    category: company_blog

  - id: anthropic_news
    name: "Anthropic News"
    name_zh: "Anthropic 新闻"
    type: rss
    url: "https://raw.githubusercontent.com/Olshansk/rss-feeds/main/feeds/feed_anthropic_news.xml"
    category: company_blog

  - id: anthropic_engineering
    name: "Anthropic Engineering"
    name_zh: "Anthropic 工程"
    type: rss
    url: "https://raw.githubusercontent.com/Olshansk/rss-feeds/main/feeds/feed_anthropic_engineering.xml"
    category: company_blog

  - id: meta_ai
    name: "Meta AI Blog"
    name_zh: "Meta AI 博客"
    type: rss
    url: "https://raw.githubusercontent.com/Olshansk/rss-feeds/main/feeds/feed_meta_ai.xml"
    category: company_blog

